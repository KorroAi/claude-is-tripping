name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check LICENSE exists
        run: test -f LICENSE && test -s LICENSE

      - name: Check README has content
        run: test -f README.md && test "$(wc -l < README.md)" -ge 20

      - name: Check SKILL.md exists and has frontmatter
        run: |
          test -f SKILL.md
          grep -q "^---$" SKILL.md
          grep -q "^name:" SKILL.md
          grep -q "^description:" SKILL.md

      - name: Check TECHNICAL.md exists
        run: test -f TECHNICAL.md && test -s TECHNICAL.md

      - name: Lint markdown links
        run: |
          ! grep -rP '\[.*\]\(\s*\)' *.md || exit 1
          ! grep -rP '\[.*\]\(http(?!s)' *.md || exit 1
